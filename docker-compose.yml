# ─── Zen Agent — Docker Compose ──────────────────────────────────
version: "3.9"

services:
  zen-agent:
    build: .
    container_name: zen-agent
    ports:
      - "9090:9090"
    env_file:
      - .env
    environment:
      - DATA_DIR=/app/data
    volumes:
      - zen-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9090/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  zen-data:
